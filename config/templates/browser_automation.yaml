# 浏览器自动化配置

# 浏览器配置
browser:
  # 浏览器类型: chromium, firefox, webkit
  browser_type: chromium
  # 是否无头模式
  headless: true
  # 操作延迟(ms)
  slow_mo: 0
  # 超时时间(ms)
  timeout: 30000
  # 视口大小
  viewport_width: 1920
  viewport_height: 1080
  # 忽略HTTPS错误
  ignore_https_errors: true
  # 下载配置
  accept_downloads: true
  downloads_path: /tmp/downloads
  # 代理配置(可选)
  # proxy_server: socks5://127.0.0.1:1080
  # proxy_bypass: localhost,127.0.0.1

# 设备登录凭证
devices:
  - name: 华为交换机
    device_type: huawei
    host: 192.168.1.1
    port: 443
    protocol: https
    username: admin
    password: Admin@123
    login_url: https://192.168.1.1/
    # 自定义选择器(可选)
    selectors:
      username: "#username"
      password: "#password"
      submit: "#loginBtn"
  
  - name: 天融信防火墙
    device_type: topsec
    host: 192.168.1.2
    port: 443
    protocol: https
    username: admin
    password: Admin@123
  
  - name: 绿盟IDS
    device_type: nsfocus
    host: 192.168.1.3
    port: 443
    protocol: https
    username: admin
    password: Admin@123

# 任务配置
tasks:
  - name: 华为设备巡检
    device_id: huawei_sw_01
    script_path: /tmp/tasks/huawei_check.py
    schedule: "0 2 * * *"  # 每天凌晨2点
    priority: normal
    timeout: 300
    retry_count: 3
    retry_interval: 60
    enabled: true
  
  - name: 设备状态监控
    device_id: all_devices
    script_path: /tmp/tasks/device_monitor.py
    schedule: "*/5 * * * *"  # 每5分钟
    priority: high
    timeout: 120
    enabled: true

# 任务执行器配置
executor:
  workers: 3
  db_path: /tmp/browser_tasks.db
  log_dir: /tmp/browser_tasks

# 截图配置
screenshot:
  enabled: true
  save_dir: /tmp/screenshots
  format: png
  full_page: true
  quality: 85
