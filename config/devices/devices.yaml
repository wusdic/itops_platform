  # ============================================================
  # Kubernetes集群示例
  # ============================================================
  - name: "生产K8s集群"
    ip: "192.168.10.10"
    type: "container"
    os: "kubernetes"
    os_version: "v1.28.3"
    vendor: "kubernetes"
    protocols:
      primary: "kubernetes"
    kubernetes:
      api_server: "https://192.168.10.10:6443"
      token: ""  # 从环境变量K8S_API_TOKEN读取
      tls_ca_cert: "/etc/itops/k8s-ca.crt"
      skip_tls_verify: false
      namespaces: []  # 空表示所有命名空间
    collect:
      enabled: true
      interval: 30
      metrics:
        - node
        - pod
        - service
        - deployment
        - namespace
        - persistent_volume
    tags:
      env: production
      cluster: prod-cluster

  # ============================================================
  # Docker主机示例
  # ============================================================
  - name: "Docker-Host-01"
    ip: "192.168.10.20"
    type: "container"
    os: "docker"
    os_version: "24.0.5"
    vendor: "docker"
    protocols:
      primary: "docker"
    credentials:
      docker:
        host: "tcp://192.168.10.20:2375"
        tls_cert: ""  # 可选，HTTPS时使用
        tls_key: ""
        tls_ca: ""
    collect:
      enabled: true
      interval: 30
      metrics:
        - container
        - image
        - network
        - volume
        - container_stats
    tags:
      env: production
      node: worker-1

  # ============================================================
  # VMware ESXi虚拟化示例
  # ============================================================
  - name: "ESXi-Host-01"
    ip: "192.168.10.30"
    type: "virtual"
    os: "esxi"
    os_version: "ESXi 7.0 U3"
    vendor: "vmware"
    protocols:
      primary: "http"
      fallback: "snmp"
    api:
      base_url: "https://192.168.10.30/sdk"
      auth_type: "basic"
      username: "root"
      password: ""
      verify_ssl: false
    credentials:
      snmp:
        version: "v2c"
        community: "public"
        port: 161
    collect:
      enabled: true
      interval: 60
      metrics:
        - vm
        - datastore
        - network
        - cpu
        - memory
    tags:
      env: production
      hw_type: virtual

  # ============================================================
  # Zabbix监控集成示例
  # ============================================================
  - name: "Zabbix-Server"
    ip: "192.168.1.100"
    type: "monitor"
    os: "linux"
    os_version: "Zabbix 6.4"
    vendor: "zabbix"
    protocols:
      primary: "zabbix"
    api:
      base_url: "http://192.168.1.100/zabbix/api_jsonrpc.php"
      auth_type: "api_token"
      username: "Admin"
      password: "zabbix"
    collect:
      enabled: true
      interval: 60
      metrics:
        - zabbix_hosts
        - zabbix_items
        - zabbix_triggers
    tags:
      env: production

  # ============================================================
  # Prometheus监控集成示例
  # ============================================================
  - name: "Prometheus-Server"
    ip: "192.168.1.101"
    type: "monitor"
    os: "linux"
    os_version: "Prometheus 2.47"
    vendor: "prometheus"
    protocols:
      primary: "prometheus"
    api:
      base_url: "http://192.168.1.101:9090"
      auth_type: "none"
    collect:
      enabled: true
      interval: 30
      metrics:
        - prometheus_targets
        - prometheus_rules
        - prometheus_alerts
    tags:
      env: production
