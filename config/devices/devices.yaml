# ITOps Platform 设备配置示例
# 所有设备通过配置文件定义，程序自动加载适配器

devices:
  # ============================================================
  # Linux服务器示例
  # ============================================================
  - name: "Web服务器-01"
    ip: "192.168.1.101"
    type: "server"
    os: "linux"
    os_version: "Ubuntu 22.04 LTS"
    vendor: "generic"
    protocols:
      primary: "ssh"
      fallback: "snmp"
    credentials:
      ssh:
        username: "root"
        # password或key_file二选一
        password: ""  # 留空则使用key_file
        key_file: "/etc/itops/id_rsa"
        port: 22
      snmp:
        version: "v2c"
        community: "public"
        port: 161
    collect:
      enabled: true
      interval: 60  # 秒
      metrics:
        - cpu
        - memory
        - disk
        - network
        - process
    tags:
      env: production
      owner: ops-team
      location: rack-01

  # ============================================================
  # Windows服务器示例
  # ============================================================
  - name: "数据库服务器"
    ip: "192.168.1.102"
    type: "server"
    os: "windows"
    os_version: "Windows Server 2019 Datacenter"
    vendor: "microsoft"
    protocols:
      primary: "winrm"
      fallback: "wmi"
    credentials:
      winrm:
        username: "Administrator"
        password: ""  # 从环境变量ITOPS_WINRM_PASSWORD读取
        port: 5985
        ssl: false
        auth: ntlm  # ntlm, kerberos, plaintext
      wmi:
        username: "Administrator"
        password: ""
    collect:
      enabled: true
      interval: 60
      metrics:
        - cpu
        - memory
        - disk
        - service
        - eventlog
    tags:
      env: production
      owner: dba-team

  # ============================================================
  # 麒麟Linux服务器示例 (国产化)
  # ============================================================
  - name: "麒麟应用服务器"
    ip: "192.168.1.110"
    type: "server"
    os: "kylin"
    os_version: "Kylin Linux V10 SP1"
    vendor: "neokylin"
    protocols:
      primary: "ssh"
      fallback: "snmp"
    credentials:
      ssh:
        username: "root"
        password: ""
        key_file: "/etc/itops/id_rsa_kylin"
        port: 22
      snmp:
        version: "v2c"
        community: "public"
        port: 161
    collect:
      enabled: true
      interval: 60
      metrics:
        - cpu
        - memory
        - disk
        - network
    tags:
      env: staging
      compliance: "国产化"

  # ============================================================
  # Cisco网络设备示例
  # ============================================================
  - name: "核心交换机-CORE-01"
    ip: "192.168.1.1"
    type: "network"
    os: "ios-xe"
    os_version: "IOS-XE 17.09.01"
    vendor: "cisco"
    protocols:
      primary: "snmp"
      fallback: "ssh"
    credentials:
      snmp:
        version: "v2c"
        community: "public"
        port: 161
        # v3配置示例 (注释掉如不需要)
        # version: "v3"
        # security_name: "itops"
        # auth_protocol: "sha"  # sha, md5
        # auth_password: ""
        # priv_protocol: "aes"  # aes, des
        # priv_password: ""
      ssh:
        username: "cisco_admin"
        password: ""
        key_file: "/etc/itops/id_rsa_cisco"
        port: 22
    collect:
      enabled: true
      interval: 120
      metrics:
        - interface
        - cpu
        - memory
        - vlan
        - bgp
        - ospf
    tags:
      env: production
      location: datacenter-core

  # ============================================================
  # Huawei网络设备示例
  # ============================================================
  - name: "汇聚交换机-ACC-01"
    ip: "192.168.1.2"
    type: "network"
    os: "vrp"
    os_version: "VRP 8.180 R3"
    vendor: "huawei"
    protocols:
      primary: "snmp"
      fallback: "ssh"
    credentials:
      snmp:
        version: "v2c"
        community: "public"
        port: 161
      ssh:
        username: "huawei_admin"
        password: ""
        key_file: "/etc/itops/id_rsa_huawei"
        port: 22
    collect:
      enabled: true
      interval: 120
      metrics:
        - interface
        - cpu
        - memory
        - vlan
    tags:
      env: production
      location: datacenter-access

  # ============================================================
  # 天融信防火墙示例 (国产安全设备)
  # ============================================================
  - name: "防火墙-FW-01"
    ip: "192.168.1.254"
    type: "security"
    os: "tos"
    os_version: "TOS V5.0 SP3"
    vendor: "topsec"
    protocols:
      primary: "http"
      fallback: "snmp"
    api:
      base_url: "https://192.168.1.254:443"
      version: "v2"
      auth_type: "api_key"  # api_key, basic, session
      api_key: ""  # 从环境变量ITOPS_TOPSEC_APIKEY读取
      verify_ssl: true
    credentials:
      snmp:
        version: "v2c"
        community: "public"
        port: 161
    collect:
      enabled: true
      interval: 180
      metrics:
        - firewall_status
        - session_count
        - throughput
        - blocked_attacks
    tags:
      env: production
      compliance: "等保三级"

  # ============================================================
  # 绿盟安全设备示例
  # ============================================================
  - name: "IDS入侵检测"
    ip: "192.168.1.200"
    type: "security"
    os: "nsfocus"
    os_version: "NSFOCUS 5.0R03"
    vendor: "nsfocus"
    protocols:
      primary: "http"
      fallback: "snmp"
    api:
      base_url: "http://192.168.1.200:8080"
      version: "v1"
      auth_type: "basic"
      username: "admin"
      password: ""  # 从环境变量ITOPS_NSFOCUS_PASSWORD读取
      verify_ssl: false
    credentials:
      snmp:
        version: "v2c"
        community: "public"
        port: 161
    collect:
      enabled: true
      interval: 180
      metrics:
        - ids_alerts
        - blocked_ips
        - attack_types
    tags:
      env: production

  # ============================================================
  # 启明星辰安全设备示例
  # ============================================================
  - name: "启明UTM网关"
    ip: "192.168.1.201"
    type: "security"
    os: "venustech"
    os_version: "Venustech IPS 6.0"
    vendor: "venustech"
    protocols:
      primary: "http"
      fallback: "snmp"
    api:
      base_url: "https://192.168.1.201:443"
      version: "v1"
      auth_type: "basic"
      username: "admin"
      password: ""
      verify_ssl: false
    credentials:
      snmp:
        version: "v2c"
        community: "public"
        port: 161
    collect:
      enabled: true
      interval: 180
      metrics:
        - utm_status
        - threat_detection
    tags:
      env: production

  # ============================================================
  # 深信服防火墙示例
  # ============================================================
  - name: "深信服AF边界防火墙"
    ip: "192.168.1.202"
    type: "security"
    os: "af"
    os_version: "Sangfor AF 8.0.75"
    vendor: "sangfor"
    protocols:
      primary: "http"
      fallback: "snmp"
    api:
      base_url: "https://192.168.1.202:443"
      version: "v1"
      auth_type: "session"
      username: "admin"
      password: ""
      verify_ssl: false
      session_cookie: ""  # 可选，API自动管理session
    credentials:
      snmp:
        version: "v2c"
        community: "public"
        port: 161
    collect:
      enabled: true
      interval: 180
      metrics:
        - firewall_policy
        - session_limit
        - bandwidth
        - attack_block
    tags:
      env: production
      compliance: "等保三级"

  # ============================================================
  # Dell服务器示例 (带IPMI)
  # ============================================================
  - name: "DellPowerEdge-R740"
    ip: "192.168.1.50"
    type: "server"
    os: "linux"
    os_version: "RHEL 8.8"
    vendor: "dell"
    protocols:
      primary: "ipmi"
      fallback: "snmp"
    credentials:
      ipmi:
        username: "root"
        password: ""  # 从环境变量ITOPS_IPMI_PASSWORD读取
        port: 623
        version: "2.0"  # 1.5, 2.0
      snmp:
        version: "v2c"
        community: "public"
        port: 161
      ssh:
        username: "root"
        password: ""
        key_file: "/etc/itops/id_rsa"
        port: 22
    collect:
      enabled: true
      interval: 60
      metrics:
        - cpu
        - memory
        - disk
        - power
        - temperature
        - fans
        - voltage
        - hardware_health
    tags:
      env: production
      hw_type: physical

  # ============================================================
  # HPE服务器示例 (带iLO)
  # ============================================================
  - name: "HPE-ProLiant-DL380"
    ip: "192.168.1.51"
    ipmi_ip: "192.168.1.51"  # BMC/iLO地址
    type: "server"
    os: "linux"
    os_version: "SLES 15 SP4"
    vendor: "hpe"
    protocols:
      primary: "ipmi"
      fallback: "snmp"
    credentials:
      ipmi:
        username: "Administrator"
        password: ""
        port: 623
        version: "2.0"
      snmp:
        version: "v2c"
        community: "public"
        port: 161
      ssh:
        username: "root"
        password: ""
        key_file: "/etc/itops/id_rsa"
        port: 22
    collect:
      enabled: true
      interval: 60
      metrics:
        - cpu
        - memory
        - disk
        - power
        - temperature
        - fans
