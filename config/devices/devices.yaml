  # ============================================================
  # Juniper防火墙示例
  # ============================================================
  - name: "Juniper-SRX340防火墙"
    ip: "192.168.1.3"
    type: "security"
    os: "junos"
    os_version: "Junos 21.4R3"
    vendor: "juniper"
    protocols:
      primary: "snmp"
