  # ============================================================
  # Fortinet防火墙示例
  # ============================================================
  - name: "FortiGate-100F防火墙"
    ip: "192.168.1.4"
    type: "security"
    os: "fortios"
    os_version: "FortiOS 7.0.4"
    vendor: "fortinet"
    protocols:
      primary: "snmp"
      fallback: "http"
    credentials:
      snmp:
        version: "v2c"
        community: "public"
        port: 161
      http:
        base_url: "https://192.168.1.4"
        username: "admin"
        password: ""
        verify_ssl: false
    collect:
      enabled: true
      interval: 120
      metrics:
        - interface
        - cpu
        - memory
        - session
