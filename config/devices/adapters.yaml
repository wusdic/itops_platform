# 采集适配器配置
# 定义每个厂商设备的协议、指标和配置模板

adapters:
  # ============================================================
  # 通用Linux/Unix服务器
  # ============================================================
  linux_generic:
    name: "通用Linux服务器"
    vendor_patterns: ["linux", "ubuntu", "centos", "red hat", "debian", "suse", "oracle linux", "rocky", "almalinux"]
    priority: 10
    protocols:
      ssh:
        enabled: true
        default_port: 22
        commands:
          cpu: "top -bn1 | grep 'Cpu(s)' | awk '{print $2}'"
          memory: "free -m | grep Mem | awk '{printf \"used:%s total:%s\", $3, $2}'"
          disk: "df -h | grep -E '^/dev' | awk '{print $1\":\"$5}'"
          load_avg: "uptime | awk -F'load average:' '{print $2}'"
          process_count: "ps aux | wc -l"
          network_stats: "cat /proc/net/dev"
        timeout: 10
      snmp:
        enabled: true
        default_port: 161
        version: "v2c"
        oids:
          cpu: "1.3.6.1.2.1.25.3.3.1.2"  # HOST-RESOURCES-MIB::hrProcessorLoad
          memory: "1.3.6.1.2.1.25.2.2"   # HOST-RESOURCES-MIB::hrMemorySize
          disk: "1.3.6.1.2.1.25.2.3.1"   # HOST-RESOURCES-MIB::hrStorage
    metrics:
      - cpu
      - memory
      - disk
      - network
      - process
      - load

  # ============================================================
  # 麒麟Linux (国产化)
  # ============================================================
  kylin:
    name: "麒麟Linux"
    vendor_patterns: ["kylin", "neokylin", "pkguos", "cos"]
    priority: 50
    protocols:
      ssh:
        enabled: true
        default_port: 22
        commands:
          cpu: "top -bn1 | head -5 | tail -1 | awk '{print $2}'"
          memory: "free -m | grep Mem | awk '{print $3\",\"$2}'"
          disk: "df -h | grep -E '^/dev' | awk '{print $1\":\"$5}'"
        timeout: 10
      snmp:
        enabled: true
        default_port: 161
        version: "v2c"
        oids:
          cpu: "1.3.6.1.4.1.2021.11.9"    # UCD-SNMP-MIB::laLoad
          memory: "1.3.6.1.4.1.2021.4"    # UCD-SNMP-MIB::mem
    metrics:
      - cpu
      - memory
      - disk
      - network

  # ============================================================
  # Windows服务器
  # ============================================================
  windows:
    name: "Windows服务器"
    vendor_patterns: ["windows", "microsoft"]
    priority: 30
    protocols:
      winrm:
        enabled: true
        default_port: 5985
        ssl_port: 5986
        commands:
          cpu: "Get-Counter '\\Processor(_Total)\\% Processor Time' -SampleInterval 1 -MaxSamples 1"
          memory: "Get-CimInstance Win32_OperatingSystem | Select TotalVisibleMemorySize,FreePhysicalMemory"
          disk: "Get-CimInstance Win32_LogicalDisk | Select DeviceID,Size,FreeSpace"
          service: "Get-Service | Where Status -eq 'Running' | Measure-Object"
          process: "Get-Process | Measure-Object"
        timeout: 30
      wmi:
        enabled: true
        classes:
          - Win32_OperatingSystem
          - Win32_Processor
          - Win32_PhysicalMemory
          - Win32_LogicalDisk
          - Win32_NetworkAdapterConfiguration
          - Win32_Service
          - Win32_Process
    metrics:
      - cpu
      - memory
      - disk
      - network
      - service
      - process

  # ============================================================
  # Cisco IOS/IOS-XE/NX-OS
  # ============================================================
  cisco:
    name: "Cisco网络设备"
    vendor_patterns: ["cisco", "ios-xe", "nx-os", "ios", "catios"]
    priority: 40
    protocols:
      snmp:
        enabled: true
        default_port: 161
        version: "v2c"
        oids:
          # System
          sysDescr: "1.3.6.1.2.1.1.1"     # SNMPv2-MIB::sysDescr
          sysUpTime: "1.3.6.1.2.1.1.3"     # SNMPv2-MIB::sysUpTime
          # Interfaces (ifXTable for 64-bit)
          ifNumber: "1.3.6.1.2.1.2.1"      # IF-MIB::ifNumber
          ifDescr: "1.3.6.1.2.1.2.2.1.2"   # IF-MIB::ifDescr
          ifSpeed: "1.3.6.1.2.1.2.2.1.5"   # IF-MIB::ifSpeed
          ifOperStatus: "1.3.6.1.2.1.2.2.1.8"  # IF-MIB::ifOperStatus
          ifHCInOctets: "1.3.6.1.2.1.31.1.1.1.6"  # IF-MIB::ifHCInOctets
          ifHCOutOctets: "1.3.6.1.2.1.31.1.1.1.10" # IF-MIB::ifHCOutOctets
          # CPU
          cpus: "1.3.6.1.4.1.9.2.6.8"      # CISCO-PROCESS-MIB::cpmCPUTotal5min
          # Memory
          memory: "1.3.6.1.4.1.9.9.48"     # CISCO-MEMORY-POOL-MIB
          # BGP
          bgpPeerState: "1.3.6.1.2.1.15.3.1.2"  # BGP4-MIB::bgpPeerState
          bgpPeerPrefix: "1.3.6.1.2.1.15.5.1.1"  # BGP4-MIB::bgpPeerPrefix
        trap_oids:
          cold_start: "1.3.6.1.6.5.1"      # SNMPv2-MIB::coldStart
          warm_start: "1.3.6.1.6.5.2"      # SNMPv2-MIB::warmStart
          link_down: "1.3.6.1.6.5.1.3"     # IF-MIB::linkDown
          link_up: "1.3.6.1.6.5.1.4"       # IF-MIB::linkUp
      ssh:
        enabled: true
        default_port: 22
        commands:
          show_version: "show version"
          show interfaces: "show interfaces"
          show ip interface: "show ip interface"
          show cpu: "show processes cpu"
          show memory: "show memory"
          show vlan: "show vlan"
        timeout: 30
    metrics:
      - interface
      - cpu
      - memory
      - vlan
      - bgp
      - ospf

  # ============================================================
  # Huawei VRP
  # ============================================================
  huawei:
    name: "华为网络设备"
    vendor_patterns: ["huawei", "vrp", "quidway", "s5700", "s6700", "ce12800"]
    priority: 40
    protocols:
      snmp:
        enabled: true
        default_port: 161
        version: "v2c"
        oids:
          # System
          sysDescr: "1.3.6.1.2.1.1.1"
          sysUpTime: "1.3.6.1.2.1.1.3"
          # Interfaces
          ifDescr: "1.3.6.1.2.1.2.2.1.2"
          ifSpeed: "1.3.6.1.2.1.2.2.1.5"
          ifOperStatus: "1.3.6.1.2.1.2.2.1.8"
          ifHCInOctets: "1.3.6.1.2.1.31.1.1.1.6"
          ifHCOutOctets: "1.3.6.1.2.1.31.1.1.1.10"
          # CPU (Huawei私有)
          cpu: "1.3.6.1.4.1.2011.5.25.31.1.1.1"  # HUAWEI-DEVICE-EXT-MIB
          # Memory (Huawei私有)
          memory: "1.3.6.1.4.1.2011.5.25.31.1.1.2"
        trap_oids:
          hwColdStart: "1.3.6.1.4.1.2011.10.2.1.0.1"
          hwLinkDown: "1.3.6.1.4.1.2011.10.2.1.0.2"
          hwLinkUp: "1.3.6.1.4.1.2011.10.2.1.0.3"
      ssh:
        enabled: true
        default_port: 22
        commands:
          show version: "display version"
          show interface: "display interface"
          show cpu: "display cpu-usage"
          show memory: "display memory-usage"
          show vlan: "display vlan"
        timeout: 30
    metrics:
      - interface
      - cpu
      - memory
      - vlan

  # ============================================================
  # Juniper JunOS
  # ============================================================
  juniper:
    name: "Juniper网络设备"
    vendor_patterns: ["juniper", "junos", "screenos", "srx", "ex", "mx", "qfx"]
    priority: 40
    protocols:
      snmp:
        enabled: true
        default_port: 161
        version: "v2c"
        oids:
          sysDescr: "1.3.6.1.2.1.1.1"
          sysUpTime: "1.3.6.1.2.1.1.3"
          ifDescr: "1.3.6.1.2.1.2.2.1.2"
          ifSpeed: "1.3.6.1.2.1.2.2.1.5"
          ifOperStatus: "1.3.6.1.2.1.2.2.1.8"
          ifHCInOctets: "1.3.6.1.2.1.31.1.1.1.6"
          ifHCOutOctets: "1.3.6.1.2.1.31.1.1.1.10"
          # Juniper私有MIB
          jnxOperatingCPU: "1.3.6.1.4.1.2636.3.1.13.1.8"  # jnxOperatingTable
          jnxOperatingMemory: "1.3.6.1.4.1.2636.3.1.13.1.11"
        trap_oids:
          warmStart: "1.3.6.1.4.1.2636.4.1.1"  # JUNIPER-WARMSTARTCONFIG-MIB
          linkDown: "1.3.6.1.4.1.2636.4.3.1.2"
          linkUp: "1.3.6.1.4.1.2636.4.3.1.3"
      ssh:
        enabled: true
        default_port: 22
        commands:
          show version: "show version"
          show interfaces: "show interfaces"
          show chassis: "show chassis"
        timeout: 30
    metrics:
      - interface
      - cpu
      - memory
      - session
      - security_policies

  # ============================================================
  # 天融信防火墙 (国产安全设备)
  # ============================================================
  topsec:
    name: "天融信防火墙"
    vendor_patterns: ["topsec", "tos", "ngfw", "topwall"]
    priority: 50
    protocols:
      http:
        enabled: true
        default_port: 443
        base_path: "/api/v2"
        auth_type: "api_key"
        headers:
          Content-Type: "application/json"
        endpoints:
          status: "/monitor/system/status"
          session: "/monitor/session/count"
          throughput: "/monitor/traffic/throughput"
          alarm: "/monitor/security/alarm"
          log: "/log/event"
        verify_ssl: true
      snmp:
        enabled: true
        default_port: 161
        version: "v2c"
        oids:
          sysDescr: "1.3.6.1.2.1.1.1"
          # 天融信私有MIB (示例)
          topSecSystemStatus: "1.3.6.1.4.1.2021.9999.1"
          topSecSessionCount: "1.3.6.1.4.1.2021.9999.2"
    metrics:
      - firewall_status
      - session_count
      - throughput
      - blocked_attacks

  # ============================================================
  # 绿盟安全设备
  # ============================================================
  nsfocus:
    name: "绿盟安全设备"
    vendor_patterns: ["nsfocus", "绿盟", "nsie", "rsas"]
    priority: 50
    protocols:
      http:
        enabled: true
        default_port: 8080
        base_path: "/api/v1"
        auth_type: "basic"
        headers:
          Content-Type: "application/json"
        endpoints:
          status: "/system/status"
          ids_alerts: "/ids/alerts"
          blocked_ips: "/ids/blockedip"
          attack_types: "/ids/attacktypes"
        verify_ssl: false
      snmp:
        enabled: true
        default_port: 161
        version: "v2c"
        oids:
          sysDescr: "1.3.6.1.2.1.1.1"
    metrics:
      - ids_alerts
      - blocked_ips
      - attack_types

  # ============================================================
  # 启明星辰安全设备
  # ============================================================
  venustech:
    name: "启明星辰安全设备"
    vendor_patterns: ["venustech", "启明", "vsc", "tvss"]
    priority: 50
    protocols:
      http:
        enabled: true
        default_port: 443
        base_path: "/api/v1"
        auth_type: "basic"
        headers:
          Content-Type: "application/json"
        endpoints:
          status: "/monitor/status"
          threat: "/threat/detection"
          event: "/event/info"
        verify_ssl: false
      snmp:
        enabled: true
        default_port: 161
        version: "v2c"
        oids:
          sysDescr: "1.3.6.1.2.1.1.1"
    metrics:
      - utm_status
      - threat_detection

  # ============================================================
  # 深信服防火墙
  # ============================================================
  sangfor:
    name: "深信服防火墙"
    vendor_patterns: ["sangfor", "深信服", "af", "ad", "ac"]
    priority: 50
    protocols:
      http:
        enabled: true
        default_port: 443
        base_path: "/api/v1"
        auth_type: "session"
        headers:
          Content-Type: "application/json"
        login_endpoint: "/user/login"
        endpoints:
          status: "/monitor/system/status"
          session: "/monitor/connection/session"
          policy: "/firewall/policy"
          bandwidth: "/monitor/bandwidth"
          attack: "/security/attack"
        verify_ssl: false
        session_cookie_name: "SESSIONID"
      snmp:
        enabled: true
        default_port: 161
        version: "v2c"
        oids:
          sysDescr: "1.3.6.1.2.1.1.1"
    metrics:
      - firewall_policy
      - session_limit
      - bandwidth
      - attack_block

  # ============================================================
  # Fortinet防火墙
  # ============================================================
  fortinet:
    name: "Fortinet防火墙"
    vendor_patterns: ["fortinet", "fortigate", "fortios", "forti"]
    priority: 40
    protocols:
      snmp:
        enabled: true
        default_port: 161
        version: "v2c"
        oids:
          sysDescr: "1.3.6.1.2.1.1.1"
          # FortiGate私有MIB
          fgSystemVersion: "1.3.6.1.4.1.12356.1.1.0"     # FORTINET-CORE-MIB
          fgSystemStatus: "1.3.6.1.4.1.12356.1.2.0"
          fgCpuUsage: "1.3.6.1.4.1.12356.1.3.1.0"
          fgMemUsage: "1.3.6.1.4.1.12356.1.4.1.0"
          fgDiskUsage: "1.3.6.1.4.1.12356.1.5.1.0"
          fgVpnTunnel: "1.3.6.1.4.1.12356.1.6.1.0"
          fgSessionCount: "1.3.6.1.4.1.12356.1.8.1.0"
        trap_oids:
          fgTrapColdStart: "1.3.6.1.4.1.12356.101.1.0.1"
          fgTrapWarmStart: "1.3.6.1.4.1.12356.101.1.0.2"
          fgTrapCpuUsageHigh: "1.3.6.1.4.1.12356.101.1.0.3"
          fgTrapMemUsageHigh: "1.3.6.1.4.1.12356.101.1.0.4"
      http:
        enabled: true
        default_port: 443
        base_path: "/api/v2"
        auth_type: "basic"
        headers:
          Content-Type: "application/json"
        endpoints:
          system: "/monitor/system"
          wifi: "/monitor/wifi"
          license: "/monitor/license"
        verify_ssl: false
    metrics:
      - interface
      - cpu
      - memory
      - session
      - antivirus
      - intrusion_prevention

  # ============================================================
  # Dell服务器 (iDRAC)
  # ============================================================
  dell:
    name: "Dell服务器"
    vendor_patterns: ["dell", "poweredge", "idrac", "dell r", "dell poweredge"]
    priority: 30
    protocols:
      ipmi:
        enabled: true
        default_port: 623
        version: "2.0"
        sensor_types:
          temperature: [0x01]
          voltage: [0x02]
          current: [0x03]
          fan: [0x04]
          power: [0x08, 0x0E]
          memory: [0x0A]
          battery: [0x1C]
        fru_support: true
        sel_support: true
        sdr_support: true
      snmp:
        enabled: true
        default_port: 161
        version: "v2c"
        oids:
          # Dell MIB (管理接口)
          dell_sysDescr: "1.3.6.1.4.1.674.10892.1.1.0"   # DRIVES-MIB
          dell_cpu: "1.3.6.1.4.1.674.10892.1.200.10.1"    # CPU
          dell_memory: "1.3.6.1.4.1.674.10892.1.300.10.1"  # Memory
          dell_disk: "1.3.6.1.4.1.674.10892.1.500.10.1"     # Disk
      ssh:
        enabled: true
        default_port: 22
        commands:
          show_raid: "omreport storage vdisk"
          show_health: "omreport system health"
        timeout: 30
    metrics:
      - cpu
      - memory
      - disk
      - power
      - temperature
      - fans
      - voltage
      - hardware_health

  # ============================================================
  # HPE服务器 (iLO)
  # ============================================================
  hpe:
    name: "HPE服务器"
    vendor_patterns: ["hp ", "hewlett", "procurve", "hpe", "gen8", "gen9", "gen10", "ilo"]
    priority: 30
    protocols:
      ipmi:
        enabled: true
        default_port: 623
        version: "2.0"
        sensor_types:
          temperature: [0x01]
          voltage: [0x02]
          current: [0x03]
          fan: [0x04]
          power: [0x08, 0x0E]
          memory: [0x0A]
        fru_support: true
        sel_support: true
        sdr_support: true
      snmp:
        enabled: true
        default_port: 161
        version: "v2c"
        oids:
          # HPE MIB
          hp_sysDescr: "1.3.6.1.4.1.11.2.3.30.1.1.0"    # HP-UNIX-MIB
          hp_cpu: "1.3.6.1.4.1.11.2.3.30.2.1.1"           # CPU
          hp_memory: "1.3.6.1.4.1.11.2.3.30.2.1.2"        # Memory
    metrics:
      - cpu
      - memory
      - disk
      - power
      - temperature
      - fans
      - hardware_health

  # ============================================================
  # 浪潮服务器
  # ============================================================
  inspur:
    name: "浪潮服务器"
    vendor_patterns: ["inspur", "haniya", "浪潮", "nx", "nf"]
    priority: 30
    protocols:
      ipmi:
        enabled: true
        default_port: 623
        version: "2.0"
        sensor_types:
          temperature: [0x01]
          voltage: [0x02]
          fan: [0x04]
          power: [0x08]
      snmp:
        enabled: true
        default_port: 161
        version: "v2c"
        oids:
          inspur_sysDescr: "1.3.6.1.4.1.21328.1.1.0"
          inspur_cpu: "1.3.6.1.4.1.21328.2.1.1"
          inspur_memory: "1.3.6.1.4.1.21328.3.1.1"
    metrics:
      - cpu
      - memory
      - disk
      - power
      - temperature
      - fans

  # ============================================================
  # VMware ESXi
  # ============================================================
  vmware:
    name: "VMware虚拟化"
    vendor_patterns: ["vmware", "esxi", "esx", "vsphere"]
    priority: 30
    protocols:
      http:
        enabled: true
        default_port: 443
        base_path: "/sdk"
        auth_type: "basic"
        headers:
          Content-Type: "text/xml"
          SOAPAction: "urn:vim25/6.0"
        verify_ssl: false
        endpoints:
          host: "/mob/?moid=ha-host"
          vm_list: "/mob/?moid=vmcompute"
          datastore: "/mob/?moid=ha-datastore"
      snmp:
        enabled: true
        default_port: 161
        version: "v2c"
        oids:
          vmware_sysDescr: "1.3.6.1.4.1.6876.1.1.0"   # VMWARE-PRODUCTS-MIB
          vmware_cpu: "1.3.6.1.4.1.6876.2.1.1"
          vmware_memory: "1.3.6.1.4.1.6876.2.2.1"
          vmware_vm: "1.3.6.1.4.1.6876.4.1.1"
    metrics:
      - vm
      - datastore
      - network
      - cpu
      - memory

  # ============================================================
  # Kubernetes
  # ============================================================
  kubernetes:
    name: "Kubernetes集群"
    vendor_patterns: ["kubernetes", "k8s", "openshift"]
    priority: 20
    protocols:
      kubernetes:
        enabled: true
        default_port: 6443
        api_version: "v1"
        namespaces: []  # 空表示所有命名空间
        resources:
          - nodes
          - pods
          - services
          - deployments
          - statefulsets
          - daemonsets
          - jobs
          - cronjobs
          - persistentvolumes
          - namespaces
          - events
        timeout: 30
    metrics:
      - node
      - pod
      - service
      - deployment
      - namespace
      - persistent_volume

  # ============================================================
  # Docker
  # ============================================================
  docker:
    name: "Docker容器引擎"
    vendor_patterns: ["docker", "docker-ce", "docker-ee"]
    priority: 20
    protocols:
      docker:
        enabled: true
        default_port: 2375
        api_version: "1.41"
        resources:
          - containers
          - images
          - networks
          - volumes
          - nodes
          - services
          - stacks
        timeout: 30
    metrics:
      - container
      - image
      - network
      - volume
      - container_stats

  # ============================================================
  # Zabbix
  # ============================================================
  zabbix:
    name: "Zabbix监控"
    vendor_patterns: ["zabbix"]
    priority: 20
    protocols:
      zabbix:
        enabled: true
        default_port: 80
        api_version: "v1"
        endpoints:
          login: "/api_jsonrpc.php"
          hosts: "/api_jsonrpc.php"
          items: "/api_jsonrpc.php"
          history: "/api_jsonrpc.php"
        timeout: 30
    metrics:
      - zabbix_hosts
      - zabbix_items
      - zabbix_triggers
      - zabbix_history

  # ============================================================
  # Prometheus
  # ============================================================
  prometheus:
    name: "Prometheus监控"
    vendor_patterns: ["prometheus"]
    priority: 20
    protocols:
      prometheus:
        enabled: true
        default_port: 9090
        api_version: "v1"
        endpoints:
          query: "/api/v1/query"
          query_range: "/api/v1/query_range"
          targets: "/api/v1/targets"
          rules: "/api/v1/rules"
          alerts: "/api/v1/alerts"
        timeout: 30
    metrics:
      - prometheus_targets
      - prometheus_rules
      - prometheus_alerts

  # ============================================================
  # 通用网络设备 (适用于H3C、TP-Link、D-Link等)
  # ============================================================
  network_generic:
    name: "通用网络设备"
    vendor_patterns: ["h3c", "comware", "hp networking", "tplink", "dlink", "netgear", "zte", "raisecomm"]
    priority: 5
    protocols:
      snmp:
        enabled: true
        default_port: 161
        version: "v2c"
        oids:
          sysDescr: "1.3.6.1.2.1.1.1"
          sysUpTime: "1.3.6.1.2.1.1.3"
          ifDescr: "1.3.6.1.2.1.2.2.1.2"
          ifSpeed: "1.3.6.1.2.1.2.2.1.5"
          ifOperStatus: "1.3.6.1.2.1.2.2.1.8"
          ifHCInOctets: "1.3.6.1.2.1.31.1.1.1.6"
          ifHCOutOctets: "1.3.6.1.2.1.31.1.1.1.10"
      ssh:
        enabled: true
        default_port: 22
        commands:
          show version: "display version"
          show interface: "display interface"
        timeout: 30
    metrics:
      - interface
      - cpu
      - memory

  # ============================================================
  # 通用安全设备 (适用于其他国产防火墙)
  # ============================================================
  security_generic:
    name: "通用安全设备"
    vendor_patterns: ["firewall", "utm", "ips", "waf", "ddos"]
    priority: 5
    protocols:
      snmp:
        enabled: true
        default_port: 161
        version: "v2c"
        oids:
          sysDescr: "1.3.6.1.2.1.1.1"
          sysUpTime: "1.3.6.1.2.1.1.3"
      http:
        enabled: true
        default_port: 443
        base_path: "/api"
        auth_type: "basic"
        headers:
          Content-Type: "application/json"
        verify_ssl: false
    metrics:
      - status
      - session
      - throughput

  # ============================================================
  # Redfish - Dell iDRAC / HPE iLO / Supermicro BMC
  # ============================================================
  redfish_generic:
    name: "Redfish BMC管理"
    vendor_patterns: ["idrac", "ilo", "bmc", "supermicro", "redfish", "drac"]
    priority: 40
    protocols:
      redfish:
        enabled: true
        default_port: 443
        ssl_verify: false
        timeout: 30
      snmp:
        enabled: false
      ipmi:
        enabled: false
    metrics:
      - cpu
      - memory
      - power
      - fans
      - temperature
      - storage
      - firmware
      - network_ports

  # ============================================================
  # Syslog 日志采集
  # ============================================================
  syslog_device:
    name: "Syslog日志设备"
    vendor_patterns: ["syslog", "network", "firewall", "switch", "router"]
    priority: 5
    protocols:
      syslog:
        enabled: true
        default_port: 514
        protocol: "UDP"
        facilities:
          - kern
          - user
          - mail
          - daemon
          - auth
          - syslog
          - lpr
          - news
          - uucp
          - cron
        levels:
          - error
          - warn
          - critical
        timeout: 10
    metrics:
      - log_errors
      - log_warnings
      - log_critical

  # ============================================================
  # Telnet - Legacy网络设备
  # ============================================================
  telnet_device:
    name: "Telnet传统设备"
    vendor_patterns: ["telnet", "legacy", "console"]
    priority: 3
    protocols:
      telnet:
        enabled: true
        default_port: 23
        terminal_type: "vt100"
        commands:
          show_version: "show version"
          show_interfaces: "show interfaces"
          show_cpu: "show cpu"
          show_memory: "show memory"
        timeout: 30
      ssh:
        enabled: false
    metrics:
      - system_info
      - interface_status
      - cpu_usage
      - memory_usage

  # ============================================================
  # MySQL 数据库
  # ============================================================
  mysql_db:
    name: "MySQL数据库"
    vendor_patterns: ["mysql", "mariadb", "percona"]
    priority: 20
    protocols:
      mysql:
        enabled: true
        default_port: 3306
        database: "mysql"
        timeout: 30
      ssh:
        enabled: true
        default_port: 22
    metrics:
      - qps
      - tps
      - connections
      - innodb_buffer
      - slow_queries
      - replication_delay

  # ============================================================
  # PostgreSQL 数据库
  # ============================================================
  postgres_db:
    name: "PostgreSQL数据库"
    vendor_patterns: ["postgresql", "postgres", "pgsql"]
    priority: 20
    protocols:
      postgres:
        enabled: true
        default_port: 5432
        database: "postgres"
        timeout: 30
      ssh:
        enabled: true
        default_port: 22
    metrics:
      - connections
      - cache_hit_ratio
      - transactions
      - slow_queries
      - replication_status

  # ============================================================
  # Redis 缓存
  # ============================================================
  redis_cache:
    name: "Redis缓存"
    vendor_patterns: ["redis"]
    priority: 20
    protocols:
      redis:
        enabled: true
        default_port: 6379
        db: 0
        timeout: 10
    metrics:
      - memory_usage
      - connections
      - command_stats
      - slowlog
      - replication

  # ============================================================
  # RabbitMQ 消息队列
  # ============================================================
  rabbitmq_mq:
    name: "RabbitMQ消息队列"
    vendor_patterns: ["rabbitmq", "rabbit"]
    priority: 20
    protocols:
      rabbitmq:
        enabled: true
        default_port: 15672
        vhost: "/"
        timeout: 30
    metrics:
      - queue_messages
      - queue_consumers
      - node_memory
      - connections
      - channels

  # ============================================================
  # Kafka 消息队列
  # ============================================================
  kafka_mq:
    name: "Kafka消息队列"
    vendor_patterns: ["kafka"]
    priority: 20
    protocols:
      kafka:
        enabled: true
        default_port: 9092
        brokers: []
        timeout: 30
    metrics:
      - broker_list
      - topic_partitions
      - consumer_lag
      - message_rate

  # ============================================================
  # Elasticsearch 日志平台
  # ============================================================
  elasticsearch:
    name: "Elasticsearch集群"
    vendor_patterns: ["elasticsearch", "es", "elastic"]
    priority: 20
    protocols:
      elasticsearch:
        enabled: true
        default_port: 9200
        index_pattern: "logstash-*"
        timeout: 30
    metrics:
      - cluster_health
      - node_count
      - shard_count
      - index_count
      - memory_usage
      - search_latency
      - query_qps

  # ============================================================
  # VMware vSphere 虚拟化
  # ============================================================
  vmware:
    name: "VMware vSphere"
    vendor_patterns: ["vmware", "vsphere", "esxi", "vcenter"]
    priority: 20
    protocols:
      vmware:
        enabled: true
        default_port: 443
        ssl_verify: false
        timeout: 60
      http:
        enabled: true
        default_port: 443
    metrics:
      - host_status
      - vm_list
      - datastore_usage
      - cluster_resources
